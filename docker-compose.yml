services:
  mysql:
    image: mysql:8.4
    container_name: keyhub-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: keyhub
      MYSQL_USER: keyhub
      MYSQL_PASSWORD: keyhub
      MYSQL_ROOT_PASSWORD: keyhub-root
    ports:
      - "3306:3306"
    volumes:
      - keyhub-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ukeyhub -pkeyhub --silent"]
      interval: 5s
      timeout: 3s
      retries: 30

  keyhub:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: keyhub-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      KEYHUB_DATABASE_DSN: keyhub:keyhub@tcp(mysql:3306)/keyhub?parseTime=true&loc=Local&charset=utf8mb4,utf8
      KEYHUB_HTTP_ADDR: :8080
      KEYHUB_ENV: ${KEYHUB_ENV:-development}
      KEYHUB_AUTO_MIGRATE: ${KEYHUB_AUTO_MIGRATE:-true}
      KEYHUB_MIGRATIONS_DIR: ${KEYHUB_MIGRATIONS_DIR:-migrations}
      KEYHUB_STATIC_DIR: ${KEYHUB_STATIC_DIR:-web/dist}
      KEYHUB_NEWAPI_BASE_URL: ${KEYHUB_NEWAPI_BASE_URL:-http://new-api:3000}
      KEYHUB_NEWAPI_ADMIN_TOKEN: ${KEYHUB_NEWAPI_ADMIN_TOKEN:-}
      KEYHUB_NEWAPI_ADMIN_USER_ID: ${KEYHUB_NEWAPI_ADMIN_USER_ID:-1}
      KEYHUB_NEWAPI_QUOTA_PER_USD: ${KEYHUB_NEWAPI_QUOTA_PER_USD:-500000}
      KEYHUB_AGGREGATION_TARGETS_JSON: ${KEYHUB_AGGREGATION_TARGETS_JSON:-}
      KEYHUB_ENCRYPTION_KEY: ${KEYHUB_ENCRYPTION_KEY:-}
      KEYHUB_AUTH_ENABLED: ${KEYHUB_AUTH_ENABLED:-true}
      KEYHUB_REGISTRATION_ENABLED: ${KEYHUB_REGISTRATION_ENABLED:-true}
      KEYHUB_BOOTSTRAP_ADMIN_USER: ${KEYHUB_BOOTSTRAP_ADMIN_USER:-admin}
      KEYHUB_BOOTSTRAP_ADMIN_PASSWORD: ${KEYHUB_BOOTSTRAP_ADMIN_PASSWORD:-}
      KEYHUB_SESSION_TTL: ${KEYHUB_SESSION_TTL:-24h}
      KEYHUB_COOKIE_SECURE: ${KEYHUB_COOKIE_SECURE:-false}
      KEYHUB_WORKER_ENABLED: ${KEYHUB_WORKER_ENABLED:-false}
      KEYHUB_POOL_REFILL_INTERVAL: ${KEYHUB_POOL_REFILL_INTERVAL:-10m}
      KEYHUB_HEALTH_CHECK_INTERVAL: ${KEYHUB_HEALTH_CHECK_INTERVAL:-30m}
      KEYHUB_USAGE_SYNC_INTERVAL: ${KEYHUB_USAGE_SYNC_INTERVAL:-15m}
    ports:
      - "8080:8080"

volumes:
  keyhub-mysql-data:
